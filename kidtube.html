// ── ROUTING ──────────────────────────────────────────────────────────────────
function useHashRouter() {
  const get = () => window.location.hash.replace(/^#/,'') || '/';
  const [path, setPath] = useState(get);
  useEffect(() => {
    const h = () => setPath(get());
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  return path;
}
function navigate(to) { window.location.hash = to; }
function Link({ to, className, children, ...p }) {
  return <a href={`#${to}`} className={className} {...p}>{children}</a>;
}

function Sv({ d, size=16, cls='' }) {

    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"

}
const IcLeft    = p => <Sv {...p} d={['M19 12H5','M12 5l-7 7 7 7']}/>;

const IcTv      = p => <Sv {...p} d={['M2 7a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V7z','M8 21h8','M12 17v4']}/>;
const IcKey     = p => <Sv {...p} d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>;
const IcGrid    = p => <Sv {...p} d={['M3 3h7v7H3z','M14 3h7v7h-7z','M3 14h7v7H3z','M14 14h7v7h-7z']}/>;

const IcLink    = p => <Sv {...p} d={['M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71','M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71']}/>;
const IcStar    = p => <Sv {...p} d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>;
const IcVideo   = p => <Sv {...p} d={['M15 10l4.553-2.07A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.89L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z']}/>;

// ── API HELPERS ───────────────────────────────────────────────────────────────
function parseDuration(iso) {
  if (!iso) return 0;
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (parseInt(m[1]||0)*3600) + (parseInt(m[2]||0)*60) + parseInt(m[3]||0);
}
function fmtDur(secs) {
  if (!secs && secs !== 0) return '0:00';
  const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}
function fmtViews(n) {
  if (isNaN(n)||n===0) return '0';
  if (n >= 1e9) return (n/1e9).toFixed(1).replace(/\.0$/,'') + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'') + 'K';
  return String(n);
}
function channelColor(id) {
  const palette = ['#E91E63','#9C27B0','#3F51B5','#2196F3','#009688','#4CAF50','#FF9800','#FF5722','#795548','#607D8B'];
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (Math.imul(h, 31) + id.charCodeAt(i)) | 0;
  return palette[Math.abs(h) % palette.length];
}

async function fetchChannelVideos(channelId, maxResults=30) {
  const uploadsId = 'UU' + channelId.slice(2);
  const plRes = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=${maxResults}&key=${API_KEY}`);
  const plData = await plRes.json();
  if (plData.error) throw new Error(plData.error.message);
  if (!plData.items?.length) return [];
  const ids = plData.items.map(i => i.snippet.resourceId.videoId).join(',');
  const vidRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,statistics&id=${ids}&key=${API_KEY}`);
  const vidData = await vidRes.json();
  if (vidData.error) throw new Error(vidData.error.message);
  return (vidData.items||[]).map(item => {
    const secs = parseDuration(item.contentDetails.duration);
    const title = item.snippet.title;
    const isShort = secs <= 61 || title.toLowerCase().includes('#shorts') || title.toLowerCase().includes('shorts');
    const thumb = item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.high?.url || item.snippet.thumbnails?.default?.url || '';
    return { id:item.id, ch:channelId, yt:item.id, title, thumb, dur:fmtDur(secs), secs,
      views:fmtViews(parseInt(item.statistics?.viewCount||'0'))+' views',
      date:(item.snippet.publishedAt||'').split('T')[0],
      desc:(item.snippet.description||'').slice(0,300), short:isShort, tags:(item.snippet.tags||[]).slice(0,5) };
  });
}

async function resolveChannel(input) {
  const t = input.trim();
  if (!t) throw new Error('Enter a YouTube channel URL or @handle');
  let id = null, forHandle = null;
  if (/^UC[\w-]{21,22}$/.test(t)) { id = t; }
  else if (/youtube\.com\/channel\/(UC[\w-]+)/.test(t)) { id = t.match(/youtube\.com\/channel\/(UC[\w-]+)/)[1]; }
  else if (/youtube\.com\/@([\w.-]+)/.test(t)) { forHandle = '@' + t.match(/youtube\.com\/@([\w.-]+)/)[1]; }
  else if (t.startsWith('@')) { forHandle = t; }
  else { forHandle = '@' + t.replace(/^@/,''); }
  const url = id
    ? `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${id}&key=${API_KEY}`
    : `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&forHandle=${encodeURIComponent(forHandle)}&key=${API_KEY}`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  if (!data.items?.length) throw new Error('Channel not found. Try the full YouTube channel URL.');
  const ch = data.items[0];
  return {
    id: ch.id,
    name: ch.snippet.title,
    handle: ch.snippet.customUrl || ('@' + ch.snippet.title.replace(/\s+/g,'').toLowerCase()),
    subscribers: fmtViews(parseInt(ch.statistics?.subscriberCount||'0')),
    color: channelColor(ch.id),
    category: 'Family',
    thumb: ch.snippet.thumbnails?.medium?.url || ch.snippet.thumbnails?.default?.url || '',
    builtin: false,
  };
}

async function fetchVideoById(input) {
  const t = input.trim();
  let vid = t;
  const m = t.match(/(?:v=|youtu\.be\/|embed\/)([\w-]{11})/);
  if (m) vid = m[1];
  if (!/^[\w-]{11}$/.test(vid)) throw new Error('Invalid YouTube video URL or ID');
  const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,statistics&id=${vid}&key=${API_KEY}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  if (!data.items?.length) throw new Error('Video not found');
  const item = data.items[0];
  const secs = parseDuration(item.contentDetails.duration);
  return {
    id: item.id, ch: item.snippet.channelId, yt: item.id,
    title: item.snippet.title,
    thumb: item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '',
    dur: fmtDur(secs), secs,
    views: fmtViews(parseInt(item.statistics?.viewCount||'0')) + ' views',
    date: (item.snippet.publishedAt||'').split('T')[0],
    desc: (item.snippet.description||'').slice(0,300),
    short: false, tags: (item.snippet.tags||[]).slice(0,5),
    chName: item.snippet.channelTitle, pinned: true,
  };
}

// Merge built-in + custom channels
function getAllChannels(s) {
  const custom = s.customChannels || [];
  const all = [...CHANNELS];
  for (const c of custom) { if (!all.find(x => x.id === c.id)) all.push(c); }
  return all;
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function filterVideos(videos, filters) {
  const allowed = [], blocked = [];
  for (const v of videos) {
    if (filters.blockShorts && v.short) continue;
    if (v.secs > 0 && v.secs < filters.minSecs) { blocked.push({...v, why:`Too short (${v.dur})`}); continue; }
    const hay = (v.title + ' ' + v.desc).toLowerCase();
    const hit = filters.keywords.find(k => hay.includes(k.toLowerCase()));
    if (hit) { blocked.push({...v, why:`Keyword: "${hit}"`}); continue; }
    allowed.push(v);
  }
  return { allowed, blocked };
}

// ── STATE ─────────────────────────────────────────────────────────────────────
const DFLT = {
  authed: false,
  pin: '1234',
  wl: CHANNELS.map(c => c.id),
  filters: { blockShorts:true, minSecs:60, keywords:['prank','challenge'] },
  history: [],
  requests: [],
  approved: [],
  customChannels: [],   // { id, name, handle, subscribers, color, category, thumb }
  pinned: [],           // parent-added videos (always allowed)
  videos: {},
  loading: {},
};
function load() {
  try {
    const s = JSON.parse(localStorage.getItem('kt4')||'null');
    return s ? {...DFLT, ...s, authed:false, videos:{}, loading:{}} : DFLT;
  } catch { return DFLT; }
}
function save(s) {
  try {
    const {authed, videos, loading, ...r} = s;
    localStorage.setItem('kt4', JSON.stringify(r));
  } catch {}
}
function reducer(s, a) {
  switch(a.t) {
    case 'LOGIN':      return a.pin===s.pin ? {...s,authed:true} : s;
    case 'LOGOUT':     return {...s,authed:false};
    case 'PIN':        return {...s,pin:a.pin};
    case 'TOGGLE_CH':  { const w=s.wl; return {...s,wl:w.includes(a.id)?w.filter(x=>x!==a.id):[...w,a.id]}; }
    case 'ADD_CH': {
      const ccs = s.customChannels||[];
      if (ccs.find(x=>x.id===a.ch.id) || CHANNELS.find(x=>x.id===a.ch.id)) return s;
      return {...s, customChannels:[...ccs,a.ch], wl:[...s.wl,a.ch.id]};
    }
    case 'DEL_CH':     return {...s, customChannels:(s.customChannels||[]).filter(x=>x.id!==a.id), wl:s.wl.filter(x=>x!==a.id)};
    case 'SET_F':      return {...s,filters:{...s.filters,[a.k]:a.v}};
    case 'ADD_KW':     { const k=a.kw.trim().toLowerCase(); return (!k||s.filters.keywords.includes(k))?s:{...s,filters:{...s.filters,keywords:[...s.filters.keywords,k]}}; }
    case 'DEL_KW':     return {...s,filters:{...s.filters,keywords:s.filters.keywords.filter(k=>k!==a.kw)}};
    case 'LOG':        { const e={...a.e,at:new Date().toISOString()}; return {...s,history:[e,...s.history.filter(x=>x.id!==e.id)].slice(0,200)}; }
    case 'REQ':        return s.requests.find(r=>r.vid===a.r.vid)?s:{...s,requests:[{...a.r,rid:Date.now()+'',at:new Date().toISOString()},...s.requests]};
    case 'APPROVE':    { const r=s.requests.find(x=>x.rid===a.rid); return {...s,requests:s.requests.filter(x=>x.rid!==a.rid),approved:r&&!s.approved.includes(r.vid)?[...s.approved,r.vid]:s.approved}; }
    case 'DENY':       return {...s,requests:s.requests.filter(x=>x.rid!==a.rid)};
    case 'CLR_HIST':   return {...s,history:[]};
    case 'ADD_PIN': {
      const ps = s.pinned||[];
      return ps.find(x=>x.id===a.v.id) ? s : {...s, pinned:[a.v,...ps]};
    }
    case 'DEL_PIN':    return {...s, pinned:(s.pinned||[]).filter(x=>x.id!==a.id)};
    case 'VIDS_START': return {...s,loading:{...s.loading,[a.ch]:'loading'}};
    case 'VIDS_OK':    return {...s,loading:{...s.loading,[a.ch]:'ok'},videos:{...s.videos,[a.ch]:a.videos}};
    case 'VIDS_ERR':   return {...s,loading:{...s.loading,[a.ch]:'err'}};
    default:           return s;
  }
}
const Ctx = createContext(null);
function AppProvider({children}) {
  const [s, d] = useReducer(reducer, undefined, load);
  useEffect(() => save(s), [s]);

  // Fetch all channels (built-in + custom saved in localStorage) on mount
  useEffect(() => {
    getAllChannels(s).forEach(ch => {
      d({t:'VIDS_START', ch:ch.id});
      fetchChannelVideos(ch.id)
        .then(videos => d({t:'VIDS_OK', ch:ch.id, videos}))
        .catch(err => { console.error('KidTube API error', ch.name, err); d({t:'VIDS_ERR', ch:ch.id}); });
    });
  }, []);

  // Fetch newly whitelisted channels that don't have data yet
  useEffect(() => {
    s.wl.forEach(chId => {
      if (!s.loading[chId]) {
        d({t:'VIDS_START', ch:chId});
        fetchChannelVideos(chId)
          .then(videos => d({t:'VIDS_OK', ch:chId, videos}))
          .catch(() => d({t:'VIDS_ERR', ch:chId}));
      }
    });
  }, [s.wl.join(',')]);

  return <Ctx.Provider value={{s,d}}>{children}</Ctx.Provider>;
}
function useApp() { return useContext(Ctx); }

// ── SHARED COMPONENTS ─────────────────────────────────────────────────────────
function Spinner({size=32}) {
  return <div style={{width:size,height:size,border:`3px solid #333`,borderTopColor:'#ef4444',borderRadius:'50%'}} className="spin"/>;
}
function LoadingGrid({label='Loading videos…'}) {
  return <div className="flex flex-col items-center justify-center py-16 gap-4"><Spinner size={36}/><p className="text-[#aaa] text-sm">{label}</p></div>;
}
function ErrBox({onRetry}) {
  return (
    <div className="flex flex-col items-center justify-center py-16 gap-3 text-center px-4">
      <div className="text-4xl">⚠️</div>
      <p className="text-white font-semibold">Couldn't load videos</p>
      <p className="text-[#aaa] text-sm max-w-xs">Check your internet or YouTube API quota.</p>
      {onRetry && <button onClick={onRetry} className="flex items-center gap-2 text-red-400 hover:text-red-300 text-sm mt-1"><IcRefresh size={14}/>Try again</button>}
    </div>
  );
}
function ChAvatar({ch, size=9}) {
  if (!ch) return null;
  if (ch.thumb) return <img src={ch.thumb} alt={ch.name} className={`w-${size} h-${size} rounded-full object-cover flex-shrink-0`} onError={e=>{e.target.onerror=null;e.target.style.display='none';}}/>;
  return <div className={`w-${size} h-${size} rounded-full flex-shrink-0 flex items-center justify-center text-white font-bold`} style={{background:ch.color,fontSize:size*2}}>{ch.name[0]}</div>;
}
function VCard({v, showCh=true}) {
  const {s} = useApp();
  const ch = getAllChannels(s).find(c => c.id === v.ch);
  const isPinned = v.pinned;
  return (
    <Link to={`/watch/${v.id}`} className="block group">
      <div className="thumb">
        <img src={v.thumb} alt={v.title} onError={e=>{e.target.onerror=null;e.target.src=`https://i.ytimg.com/vi/${v.yt}/mqdefault.jpg`;}}/>
        <span className="dur">{v.dur}</span>
        {isPinned && <span className="absolute top-2 left-2 bg-yellow-500 text-black text-[9px] font-bold px-1.5 py-0.5 rounded-full">★ Pick</span>}
      </div>
      <div className="flex gap-2 mt-2">
        {ch && <div className="w-9 h-9 rounded-full flex-shrink-0 flex items-center justify-center text-white text-sm font-bold overflow-hidden" style={{background:ch.color,fontSize:14}}>
          {ch.thumb ? <img src={ch.thumb} alt="" className="w-full h-full object-cover" onError={e=>{e.target.style.display='none';}}/> : ch.name[0]}
        </div>}
        <div className="flex-1 min-w-0">
          <p className="text-white text-sm font-medium clamp2 leading-snug">{v.title}</p>
          {showCh && <p className="text-[#aaa] text-xs mt-0.5">{ch?.name || v.chName}</p>}
          <p className="text-[#aaa] text-xs">{v.views}</p>
        </div>
      </div>
    </Link>
  );
}
function LockedCard({v, onReq, reqd}) {
  const {s} = useApp();
  const ch = getAllChannels(s).find(c => c.id === v.ch);
  return (
    <div>
      <div className="thumb" style={{opacity:.6}}>
        <img src={v.thumb} alt={v.title} style={{filter:'blur(3px)',transform:'scale(1.05)'}} onError={e=>{e.target.onerror=null;e.target.src=`https://i.ytimg.com/vi/${v.yt}/mqdefault.jpg`;}}/>
        <span className="dur">{v.dur}</span>
        <div className="absolute inset-0 flex flex-col items-center justify-center bg-black bg-opacity-50">
          <IcLock size={22} cls="text-white mb-1"/><span className="text-white text-xs text-center px-2">{v.why}</span>
        </div>
      </div>
      <div className="flex gap-2 mt-2 items-start">
        {ch && <div className="w-9 h-9 rounded-full flex-shrink-0 flex items-center justify-center text-white text-sm font-bold overflow-hidden" style={{background:ch.color,fontSize:14}}>
          {ch.thumb ? <img src={ch.thumb} alt="" className="w-full h-full object-cover" onError={e=>{e.target.style.display='none';}}/> : ch.name[0]}
        </div>}
        <div className="flex-1 min-w-0">

function VideoPlayer({vidId}) {
  const {s, d} = useApp();
  const allVids = [...Object.values(s.videos).flat(), ...(s.pinned||[])];
  const v = allVids.find(x => x.id === vidId);
  const allChs = getAllChannels(s);
  const ch = v ? allChs.find(c => c.id === v.ch) : null;
  const chOk = v && (s.wl.includes(v.ch) || v.pinned);
  const isApproved = s.approved.includes(vidId);
  const logged = useRef(false);
  function isAllowed(v) {
    if (!v) return false;
    if (v.pinned || isApproved) return true;
    if (v.short && s.filters.blockShorts) return false;
    if (v.secs > 0 && v.secs < s.filters.minSecs) return false;
    const hay = (v.title+' '+v.desc).toLowerCase();
    return !s.filters.keywords.some(k => hay.includes(k.toLowerCase()));
  }
  const ok = isAllowed(v);
  useEffect(() => {
    if (v && chOk && ok && !logged.current) { logged.current=true; d({t:'LOG',e:{id:v.id,title:v.title,ch:v.ch,chName:ch?.name||v.chName||'',thumb:v.thumb,dur:v.dur}}); }
  }, [vidId]);

    <div className="max-w-6xl mx-auto px-4 py-4">
      <div className="flex flex-col lg:flex-row gap-6">
        <div className="flex-1 min-w-0">

            <IcLeft size={16}/>Back{ch?` to ${ch.name}`:''}
          </button>
          {isLocal ? (
            <div className="relative w-full rounded-xl overflow-hidden bg-[#181818]" style={{paddingBottom:'56.25%'}}>
              <div className="absolute inset-0 flex flex-col items-center justify-center gap-4 p-6 text-center">
                <div className="w-16 h-16 bg-red-600 rounded-full flex items-center justify-center mb-2"><svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"/></svg></div>
                <p className="text-white font-semibold text-lg">Ready to watch!</p>
                <p className="text-[#aaa] text-sm max-w-xs">YouTube can't embed inside a local file. Click below to open on YouTube.</p>
                <a href={`https://www.youtube.com/watch?v=${v.yt}`} target="_blank" rel="noopener noreferrer"
                  className="flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white font-semibold px-6 py-3 rounded-xl text-sm">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"/></svg>Watch on YouTube ↗

              </div>

    </div>

// ── PIN ENTRY ─────────────────────────────────────────────────────────────────
function PinEntry() {
  const {s,d} = useApp();
  const [digits,setDigits] = useState(['','','','']);
  const [err,setErr] = useState('');
  const refs = [useRef(),useRef(),useRef(),useRef()];
  useEffect(()=>refs[0].current?.focus(),[]);
  function go(i,v){if(!/^\d?$/.test(v))return;const nd=[...digits];nd[i]=v;setDigits(nd);setErr('');if(v&&i<3)refs[i+1].current?.focus();if(i===3&&v)tryPin(nd.join(''));}
  function tryPin(pin){if(pin===s.pin){d({t:'LOGIN',pin});navigate('/parent/dashboard');}else{setErr('Incorrect PIN. Try again.');setDigits(['','','','']);setTimeout(()=>refs[0].current?.focus(),50);}}
  return (
    <div className="min-h-screen bg-[#0f0f0f] flex items-center justify-center px-4">
      <div className="w-full max-w-sm">
        <button onClick={()=>navigate('/')} className="flex items-center gap-1 text-[#aaa] hover:text-white mb-8 text-sm"><IcX size={16}/>Cancel</button>
        <div className="text-center mb-8">
          <div className="w-16 h-16 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl flex items-center justify-center mx-auto mb-4"><IcShield size={28} cls="text-white"/></div>
          <h1 className="text-white text-2xl font-bold">Parent Mode</h1>
          <p className="text-[#aaa] text-sm mt-1">Enter your PIN to manage settings</p>
          <p className="text-[#555] text-xs mt-1">Default PIN: 1234</p>
        </div>
        <div className="flex justify-center gap-3 mb-6">
          {digits.map((dg,i)=>(
            <input key={i} ref={refs[i]} type="password" inputMode="numeric" maxLength={1} value={dg}
              onChange={e=>go(i,e.target.value)} onKeyDown={e=>e.key==='Backspace'&&!dg&&i>0&&refs[i-1].current?.focus()}
              className="w-14 h-14 text-center text-2xl font-bold bg-[#1f1f1f] border-2 border-[#3f3f3f] focus:border-blue-500 rounded-xl text-white outline-none transition-colors"/>
          ))}
        </div>
        {err && <p className="text-red-400 text-sm text-center mb-4">{err}</p>}
        <button onClick={()=>tryPin(digits.join(''))} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-colors">Unlock</button>
      </div>
    </div>
  );
}

function PFilters() {
  const {s,d} = useApp();
  const {filters:f} = s;
  const [kw,setKw]=useState('');
  const [p1,setP1]=useState('');const [p2,setP2]=useState('');const [pm,setPm]=useState('');
  const [saved,setSaved]=useState(false);
  function set(k,v){d({t:'SET_F',k,v});flash();}
  function flash(){setSaved(true);setTimeout(()=>setSaved(false),2000);}
  function addKw(){if(!kw.trim())return;d({t:'ADD_KW',kw});setKw('');flash();}
  function changePin(){if(!/^\d{4}$/.test(p1))return setPm('PIN must be 4 digits.');if(p1!==p2)return setPm('PINs do not match.');d({t:'PIN',pin:p1});setP1('');setP2('');setPm('Updated!');setTimeout(()=>setPm(''),3000);}
  function Tog({on,change,label,desc}){
    return(
      <div className="flex items-start gap-3 py-3">
        <button onClick={()=>change(!on)} className={`relative w-11 h-6 rounded-full flex-shrink-0 mt-0.5 transition-colors ${on?'bg-blue-600':'bg-[#374151]'}`}>
          <span className={`absolute top-1 w-4 h-4 bg-white rounded-full shadow transition-all ${on?'left-6':'left-1'}`}/>
        </button>
        <div><p className="text-white text-sm font-medium">{label}</p>{desc&&<p className="text-[#6b7280] text-xs mt-0.5">{desc}</p>}</div>
      </div>
    );
  }
  return (
    <div>
      <div className="flex items-center justify-between mb-1">
        <h2 className="text-white text-xl font-bold">Filter Settings</h2>
        {saved&&<span className="text-green-400 text-xs">✓ Saved</span>}

      <p className="text-[#6b7280] text-sm mb-5">Changes take effect immediately.</p>
      <div className="bg-[#1f2937] rounded-xl p-4 mb-4">
        <h3 className="text-white font-semibold text-sm mb-1">YouTube Shorts</h3>
        <div className="border-t border-[#374151]"><Tog on={f.blockShorts} change={v=>set('blockShorts',v)} label="Block all Shorts" desc="Hides videos under 62s and anything with #shorts in the title."/></div>
      </div>

        <h3 className="text-white font-semibold text-sm mb-3">Minimum Video Duration</h3>
        <div className="flex items-center gap-3">
          <input type="range" min={0} max={300} step={15} value={f.minSecs} onChange={e=>set('minSecs',+e.target.value)} className="flex-1 accent-blue-500"/>
          <span className="text-white font-mono w-12 text-right text-sm">{f.minSecs===0?'Any':f.minSecs>=60?`${Math.floor(f.minSecs/60)}m`:`${f.minSecs}s`}</span>
        </div>
        <p className="text-[#6b7280] text-xs mt-2">Videos shorter than this are shown as locked.</p>
      </div>
      <div className="bg-[#1f2937] rounded-xl p-4 mb-4">
        <h3 className="text-white font-semibold text-sm mb-1">Blocked Keywords</h3>
        <p className="text-[#6b7280] text-xs mb-3">Videos whose title or description contains these words are locked.</p>
        <div className="flex flex-wrap gap-2 mb-3">
          {!f.keywords.length&&<span className="text-[#6b7280] text-xs italic">No keywords</span>}
          {f.keywords.map(k=>(
            <span key={k} className="flex items-center gap-1 bg-red-900 text-red-300 text-xs px-2.5 py-1 rounded-full">
              {k}<button onClick={()=>{d({t:'DEL_KW',kw:k});flash();}} className="hover:text-white ml-0.5"><IcX size={10}/></button>
            </span>
          ))}
        </div>
        <div className="flex gap-2">
          <input value={kw} onChange={e=>setKw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addKw()} placeholder="Add keyword…"
            className="flex-1 bg-[#111827] border border-[#374151] text-white placeholder-[#4b5563] px-3 py-2 rounded-lg text-sm outline-none focus:border-blue-500"/>
          <button onClick={addKw} className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg transition-colors"><IcPlus size={16}/></button>
        </div>
      </div>
      <div className="bg-[#1f2937] rounded-xl p-4">
        <h3 className="text-white font-semibold text-sm mb-1 flex items-center gap-2"><IcKey size={14} cls="text-blue-400"/>Change Parent PIN</h3>
        <p className="text-[#6b7280] text-xs mb-3">Current PIN: {s.pin}</p>
        <div className="flex flex-col sm:flex-row gap-2">
          <input type="password" placeholder="New PIN (4 digits)" maxLength={4} inputMode="numeric" value={p1} onChange={e=>setP1(e.target.value.replace(/\D/g,''))}
            className="flex-1 bg-[#111827] border border-[#374151] text-white placeholder-[#4b5563] px-3 py-2 rounded-lg text-sm outline-none focus:border-blue-500"/>
          <input type="password" placeholder="Confirm PIN" maxLength={4} inputMode="numeric" value={p2} onChange={e=>setP2(e.target.value.replace(/\D/g,''))}

    </div>
  );

                  <div className="flex gap-2 mt-3">
                    <button onClick={()=>d({t:'APPROVE',rid:r.rid})} className="flex items-center gap-1.5 bg-green-700 hover:bg-green-600 text-white text-sm px-3 py-1.5 rounded-lg transition-colors"><IcOk size={14}/>Approve</button>
                    <button onClick={()=>d({t:'DENY',rid:r.rid})} className="flex items-center gap-1.5 bg-[#374151] hover:bg-red-800 text-[#9ca3af] hover:text-white text-sm px-3 py-1.5 rounded-lg transition-colors"><IcXcirc size={14}/>Deny</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      <div className="mt-5 bg-[#1e3a5f] border border-blue-800 rounded-xl p-4 text-xs text-blue-400">
        <p className="text-blue-300 font-semibold mb-1">How unlock requests work</p>
        Approved videos bypass the filter for that video only. Shorts can never be unlocked.
      </div>
    </div>
  );
}

// ── PARENT LAYOUT ─────────────────────────────────────────────────────────────
const P_NAV = [
  {id:'dashboard',label:'Dashboard',   Ic:IcGrid},
  {id:'channels', label:'Channels',    Ic:IcList},
  {id:'videos',   label:'Picks',       Ic:IcStar},
  {id:'filters',  label:'Filters',     Ic:IcFilter},
  {id:'history',  label:'Watch History',Ic:IcClock},
  {id:'requests', label:'Requests',    Ic:IcMsg, badge:true},
];
const P_PAGES = {
  dashboard: <PDash/>,
  channels:  <PChannels/>,
  videos:    <PVideos/>,
  filters:   <PFilters/>,
  history:   <PHistory/>,
  requests:  <PRequests/>,
};

function ParentLayout({sec}) {
  const {s,d} = useApp();
  const pending = s.requests.length;
  return (
    <div className="min-h-screen bg-[#111827] text-white flex flex-col">
      <header className="bg-[#1f2937] border-b border-[#374151] px-4 py-3 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-lg flex items-center justify-center"><span className="text-white text-xs font-bold">KT</span></div>
          <div><p className="text-white font-bold text-sm">KidTube Parent Controls</p><p className="text-[#6b7280] text-xs">Managing your family's viewing</p></div>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={()=>navigate('/')} className="flex items-center gap-1.5 text-[#9ca3af] hover:text-white text-sm px-3 py-1.5 rounded-lg hover:bg-[#374151] transition-colors"><IcTv size={14}/><span className="hidden sm:inline">Kid View</span></button>
          <button onClick={()=>{d({t:'LOGOUT'});navigate('/');}} className="flex items-center gap-1.5 text-[#9ca3af] hover:text-red-400 text-sm px-3 py-1.5 rounded-lg hover:bg-[#374151] transition-colors"><IcLogOut size={14}/><span className="hidden sm:inline">Lock</span></button>
        </div>
      </header>
      <div className="flex flex-1 overflow-hidden">
        <nav className="w-48 bg-[#1f2937] border-r border-[#374151] flex-col py-4 gap-1 px-2 hidden sm:flex">
          {P_NAV.map(n=>(
            <button key={n.id} onClick={()=>navigate(`/parent/${n.id}`)}
              className={`relative flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium w-full transition-colors ${sec===n.id?'bg-blue-600 text-white':'text-[#9ca3af] hover:bg-[#374151] hover:text-white'}`}>
              <n.Ic size={16}/>{n.label}
              {n.badge&&pending>0&&<span className="ml-auto bg-red-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">{pending}</span>}
            </button>
          ))}
        </nav>
        <div className="sm:hidden fixed bottom-0 left-0 right-0 bg-[#1f2937] border-t border-[#374151] flex z-50">
          {P_NAV.map(n=>(
            <button key={n.id} onClick={()=>navigate(`/parent/${n.id}`)}
              className={`relative flex-1 flex flex-col items-center gap-0.5 py-2 text-[9px] font-medium ${sec===n.id?'text-blue-400':'text-[#6b7280]'}`}>
              <n.Ic size={16}/>{n.label.split(' ')[0]}
              {n.badge&&pending>0&&<span className="absolute top-1 right-1/4 bg-red-500 text-white text-[8px] font-bold w-3.5 h-3.5 rounded-full flex items-center justify-center">{pending}</span>}
            </button>
          ))}
        </div>
        <main className="flex-1 overflow-y-auto p-4 sm:p-6 pb-20 sm:pb-6">{P_PAGES[sec]||<PDash/>}</main>
      </div>
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  const {s} = useApp();
  const path = useHashRouter();
  useEffect(()=>{if(path==='/parent'&&s.authed)navigate('/parent/dashboard');},[path,s.authed]);
  if(path==='/'||path==='') return <KidLayout><KidHome/></KidLayout>;
  if(path.startsWith('/channel/')) return <KidLayout><ChannelPage chId={path.split('/')[2]}/></KidLayout>;
  if(path.startsWith('/watch/')) return <KidLayout><VideoPlayer vidId={path.split('/')[2]}/></KidLayout>;
  if(path==='/parent') return s.authed ? null : <PinEntry/>;
  if(path.startsWith('/parent/')) return s.authed ? <ParentLayout sec={path.split('/')[2]||'dashboard'}/> : <PinEntry/>;
  return <KidLayout><KidHome/></KidLayout>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <React.StrictMode><AppProvider><App/></AppProvider></React.StrictMode>
);
</script>
</body>
</html>
